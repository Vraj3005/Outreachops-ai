[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
ignore = ["E501", "B904", "B008", "E402", "F841", "F401", "W291", "E741", "C414", "C401", "B007", "B023", "N818", "UP045", "UP042"]
[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --tb=short --cov=app --cov-report=term-missing"
testpaths = [
    "tests",
]

[tool.coverage.run]
source = ["app"]
omit = ["tests/*", "app/seed.py"]

[tool.coverage.report]
show_missing = true
fail_under = 15

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
